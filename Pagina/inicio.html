<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Mejor Manga</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(120deg, #0f0f0f, #1f1f1f);
            color: #eaeaea;
        }

        .mierdapun {
            max-width: 1000px;
            margin: 60px auto;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #ffffff;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #d6d6d6;
        }

        img {
            width: 100%;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        img:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.8);
        }

        /* BOTÓN INICIO */
        .boton-inicio {
            display: inline-block;
            margin-top: 50px;
            padding: 14px 32px;
            background-color: #ffcc70;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .boton-inicio:hover {
            background-color: #ffd98f;
            transform: scale(1.08);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.4rem;
            }

            p {
                font-size: 1.05rem;
            }
        }
    </style>
</head>

<body>
    <div class="mierdapun">
        <h1>El Mejor Manga</h1>

        <p>
            En esta página somos fans del mejor manga de la historia, <strong>Punpun</strong>,
            y de su creador, Inio Asano. Además, mostramos nuestra opinión crítica sobre
            otras obras que consideramos mucho menos interesantes.
        </p>

        <img src="punpun.jpg" alt="Imagen de Punpun">

        <!-- BOTÓN INICIO -->
        <a href="../HTMLPage1.html" class="boton-inicio">← Volver al inicio</a>
    </div>
</body>
</html>
